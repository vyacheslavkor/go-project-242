name: CI

on:
  - push
  - pull_request

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Run linter
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest

    - name: Build
      run: make build

    - name: Test
      run: make test